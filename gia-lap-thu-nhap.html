    <style>
        :root {
            --bv-blue-dark: #005A9C;
            --bv-blue-primary: #007AC2;
            --bv-blue-light: #0096D6;
            --bv-gold-dark: #A67C00;

        }

        body {
            background-color: var(--bg-bright);
            color: #334155;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 150, 214, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 122, 194, 0.05) 0%, transparent 40%);

        }

        .text-corporate-blue { color: var(--bv-blue-primary); }
        .text-corporate-gold {
            background: linear-gradient(135deg, var(--bv-gold-primary), var(--bv-gold-light), var(--bv-gold-primary));
            -webkit-background-clip: text;

        }

        .gold-3d-text {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            color: #FFD700;
            text-shadow: 
                0px 1px 0px #cf9b00,

            background: linear-gradient(to bottom, #FFF9C4 0%, #FFD700 40%, #D4AF37 100%);

            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 6px rgba(212, 175, 55, 0.4));

            padding-bottom: 5px; 
        }

        .blue-gold-3d-text {
            color: var(--bv-blue-primary);
            text-shadow: 
                0px 1px 0px #cf9b00,
                0px 2px 0px #b58300,

                0px 4px 0px #7b5200,
                0px 5px 10px rgba(0,0,0,0.3);
            filter: drop-shadow(0px 4px 6px rgba(212, 175, 55, 0.3));
            line-height: 1.1;
            padding-bottom: 5px; 
        }

        .title-monumental {
            font-family: 'Montserrat', sans-serif;
            letter-spacing: -0.03em;
        }

        .premium-glass {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 40px -10px rgba(0, 122, 194, 0.08), 0 1px 3px rgba(0, 0, 0, 0.02);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .premium-glass:hover {
            box-shadow: 0 20px 40px -10px rgba(0, 122, 194, 0.12);
            transform: translateY(-2px);
        }

        .input-premium {
            background: #FFFFFF;
            border: 1.5px solid #E2E8F0;
            color: #1E293B;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            font-size: 16px; 
        }
        .input-premium:focus {
            background: #FFFFFF;
            border-color: var(--bv-blue-light);
            box-shadow: 0 0 0 4px rgba(0, 150, 214, 0.1), inset 0 2px 4px rgba(0,0,0,0.02);
            outline: none;
        }

        .role-selector { background: #F1F5F9; border-radius: 1rem; padding: 0.375rem; border: 1px solid #E2E8F0; }
        .btn-role { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #64748B; background: transparent; }
        .btn-role.active {
            background: #FFFFFF; color: var(--bv-blue-primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #E2E8F0;
        }

        .premium-checkbox {
            appearance: none; width: 1.5rem; height: 1.5rem;
            border: 1.5px solid #CBD5E1; border-radius: 0.375rem; background: #FFFFFF; cursor: pointer;
            position: relative; transition: all 0.2s ease;
        }
        .premium-checkbox:checked {
            background: var(--bv-blue-primary); border-color: var(--bv-blue-primary);

        .premium-checkbox:checked::after {
            content: '✓'; position: absolute; color: #FFF; font-size: 1rem; font-weight: 900;
            top: 50%; left: 50%; transform: translate(-50%, -50%);

        .font-money { font-family: 'Inter', sans-serif; font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }
        .total-card {
            background: linear-gradient(135deg, var(--bv-blue-primary) 0%, var(--bv-blue-dark) 100%);
            color: #FFFFFF; box-shadow: 0 20px 40px -10px rgba(0, 90, 156, 0.4); border-radius: 1.5rem; overflow: hidden; position: relative;
        }
        .total-card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg); animation: shine 6s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
        
        .float-slow { animation: float 5s ease-in-out infinite; }
        .float-delayed { animation: float 6s ease-in-out infinite 1.5s; }
        .float-fast { animation: float 4s ease-in-out infinite 0.5s; }

        .accordion-btn { transition: background-color 0.2s; }

        ::-webkit-scrollbar { width: 6px; }

        @media (max-width: 1279px) { .mobile-pb { padding-bottom: 7.5rem; } }

 <div id="loginScreen" style="position:fixed;inset:0;background:#E8F0FE;z-index:9999;display:flex;align-items:center;justify-content:center;">
    <div style="background:#fff;padding:40px;border-radius:12px;width:100%;max-width:400px;box-shadow:0 10px 25px rgba(0,0,0,0.05);text-align:center;border-top:4px solid #3B006B;">
        <h2 style="font-size:24px;font-weight:bold;margin-bottom:8px;">Giả Lập Thu Nhập</h2>
        <p style="font-size:14px;color:#64748B;margin-bottom:24px;">Vui lòng nhập mã bảo mật để truy cập hệ thống</p>
        <input type="password" id="passInputTN" style="width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:8px;font-size:15px;outline:none;margin-bottom:16px;" placeholder="Nhập mật khẩu..." onkeypress="if(event.key==='Enter') checkPassTN()">
        <button onclick="checkPassTN()" style="background:#007AC2;color:#fff;padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer;border:none;width:100%;">Đăng Nhập</button>
        <p id="loginErrTN" style="color:#ef4444;font-size:14px;margin-top:12px;display:none;">Mật khẩu không đúng!</p>
    </div>
 </div>
 <script>
 function checkPassTN() {
     if(document.getElementById('passInputTN').value === '233DK') {
         document.getElementById('loginScreen').style.display = 'none';
     } else {
         document.getElementById('loginErrTN').style.display = 'block';
     }
 }
 </script>
 
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        function App() {
            // === STATE QUẢN LÝ CHỨC VỤ VÀ PHÂN LOẠI ===
            const [role, setRole] = useState('TVV');
            const [isNewAgent, setIsNewAgent] = useState(false);
            
            // Checkbox: Có thể tick đồng thời cả 2 nếu là TN
            const [isTuyenNgang, setIsTuyenNgang] = useState(false);
            const [thangChucVuTN, setThangChucVuTN] = useState(1);
            const [thuongLuyKeTuyenNgang, setThuongLuyKeTuyenNgang] = useState('');

            const [isNewManager, setIsNewManager] = useState(false);
            const [thangChucVu, setThangChucVu] = useState(1);

            const [thangChucVuTNMoi, setThangChucVuTNMoi] = useState(1);
            const [thuongQuanLyMoiTNMoi, setThuongQuanLyMoiTNMoi] = useState('');

            // === STATE CÁ NHÂN ===
            const [ipThang, setIpThang] = useState('');
            const [fycThang, setFycThang] = useState('');
            const [thangThamNien, setThangThamNien] = useState(1);
            const [daHocDaoTao, setDaHocDaoTao] = useState(true);
            
            const [ipChangGiaDinh1, setIpChangGiaDinh1] = useState('');
            const [ipChangGiaDinh2, setIpChangGiaDinh2] = useState('');

            const [ipGiaDinh1, setIpGiaDinh1] = useState('');
            const [ipGiaDinh2, setIpGiaDinh2] = useState('');

            const [pr15, setPr15] = useState(85);
            const [tltp, setTltp] = useState(90);
            const [phiThucThuQuy, setPhiThucThuQuy] = useState(30);

            // === STATE NHÓM TRỰC TIẾP ===
            const [soTvvmHdc, setSoTvvmHdc] = useState('');
            const [fypTvvm, setFypTvvm] = useState('');
            const [tongThuongTvvm, setTongThuongTvvm] = useState(''); 
            
            const [fypNhomThang, setFypNhomThang] = useState('');
            const [fycNhomThang, setFycNhomThang] = useState('');
            const [luotHdcNhom, setLuotHdcNhom] = useState('');
            
            const [fypNhomGiaDinh1, setFypNhomGiaDinh1] = useState('');
            const [fypNhomGiaDinh2, setFypNhomGiaDinh2] = useState('');
            const [tuyenTvvmQuy, setTuyenTvvmQuy] = useState('');
            const [luotHoatDongQuy, setLuotHoatDongQuy] = useState('');

            // === STATE THI ĐUA ===
            const [thiDuaTCT, setThiDuaTCT] = useState('');
            const [thiDuaCT, setThiDuaCT] = useState('');

            // === AI STATE ===
            const [geminiAdvice, setGeminiAdvice] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            const [openPanels, setOpenPanels] = useState({ caNhan: true, nhom: true, thiDua: true });
            const togglePanel = (panel) => {
                setOpenPanels(prev => ({ ...prev, [panel]: !prev[panel] }));
            };

            const num = (val) => Number(val) || 0;
            const fmt = (value) => new Intl.NumberFormat('vi-VN').format(Math.round(value));

            // ================= LOGIC TÍNH TOÁN =================
            const tongIpLuyKeChang = useMemo(() => num(ipThang) + num(ipChangGiaDinh1) + num(ipChangGiaDinh2), [ipThang, ipChangGiaDinh1, ipChangGiaDinh2]);
            const tongFypQuyCaNhan = useMemo(() => num(ipThang) + num(ipGiaDinh1) + num(ipGiaDinh2), [ipThang, ipGiaDinh1, ipGiaDinh2]);
            const tongFypQuyNhom = useMemo(() => num(fypNhomThang) + num(fypNhomGiaDinh1) + num(fypNhomGiaDinh2), [fypNhomThang, fypNhomGiaDinh1, fypNhomGiaDinh2]);

            const calcCaNhan = useMemo(() => {
                let thuongTvvmThang = 0, thuongChangTvvm = 0, ipTrieu = num(ipThang); 
                if (isNewAgent && thangThamNien <= 12 && ipTrieu >= 12) {
                    if (daHocDaoTao) thuongTvvmThang = thangThamNien <= 3 ? 1000000 : 500000;
                    else thuongTvvmThang = thangThamNien <= 3 ? 1000000 : 0;
                }
                if (isNewAgent && role === 'TVV' && thangThamNien >= 1 && thangThamNien <= 12) {
                    let chang = Math.ceil(thangThamNien / 3), ipLuyKe = tongIpLuyKeChang;
                    if (chang === 1) {
                        if (ipLuyKe >= 100) thuongChangTvvm = daHocDaoTao ? 6000000 : 3000000; 
                        else if (ipLuyKe >= 50) thuongChangTvvm = 3000000; 
                    } else {
                        if (ipLuyKe >= 50) thuongChangTvvm = daHocDaoTao ? 3000000 : 1500000;
                    }
                }
                
                let tyLeNangSuat = 0;
                if (ipTrieu >= 50) tyLeNangSuat = 0.18;
                else if (ipTrieu >= 24) tyLeNangSuat = 0.15;
                else if (ipTrieu >= 12) tyLeNangSuat = 0.10;
                const thuongNangSuat = num(fycThang) * tyLeNangSuat;

                let tyLeThuongQuy = 0, fQuy = tongFypQuyCaNhan;
                // FIX: Sửa lại điều kiện thưởng quý thành >= thay vì >
                if (fQuy >= 500) tyLeThuongQuy = 0.25;
                else if (fQuy >= 350) tyLeThuongQuy = 0.20;
                else if (fQuy >= 250) tyLeThuongQuy = 0.18;
                else if (fQuy >= 150) tyLeThuongQuy = 0.15;
                else if (fQuy >= 90) tyLeThuongQuy = 0.13;
                else if (fQuy >= 60) tyLeThuongQuy = 0.10;
                else if (fQuy >= 24) tyLeThuongQuy = 0.08;

                let tyLeDieuChinhTltp = 0;
                if (pr15 >= 85) {
                    if (tltp >= 88) tyLeDieuChinhTltp = num(phiThucThuQuy) >= 30 ? (tltp / 100) : 1;
                    else if (tltp >= 80) tyLeDieuChinhTltp = 0.8;
                    else if (tltp >= 70) tyLeDieuChinhTltp = 0.5;
                    else if (tltp >= 60) tyLeDieuChinhTltp = 0.3;
                    else tyLeDieuChinhTltp = 0;
                }

                let thuongQuyCaNhan = 0;
                if (pr15 >= 85) {
                    let fycQuyUocTinh = fQuy * 1000000 * 0.3; 
                    thuongQuyCaNhan = tyLeThuongQuy * tyLeDieuChinhTltp * fycQuyUocTinh;
                }

                return {
                    hoaHong: num(fycThang), thuongTvvmThang, thuongChangTvvm, thuongNangSuat, tyLeNangSuat,
                    thuongQuyCaNhan, tyLeThuongQuy, tyLeDieuChinhTltp,
                    tong: num(fycThang) + thuongTvvmThang + thuongChangTvvm + thuongNangSuat + thuongQuyCaNhan
                };
            }, [ipThang, fycThang, isNewAgent, thangThamNien, daHocDaoTao, tongFypQuyCaNhan, tongIpLuyKeChang, pr15, tltp, phiThucThuQuy, role]);

            const calcNhom = useMemo(() => {
                if (role === 'TVV') return { tong: 0 };
                let thuongTuyenLuyen = 0, thuongDongHanh = 0, thuongVuotTroi = 0;
                let tyLeDongHanh = 0, tyLeTuyenLuyen = 0, tyLePtkd = 0, tyLeTieuChuanQuy = 0, tyLeDieuChinhTltp = 0;
                let t_tvvm = num(soTvvmHdc), f_tvvm = num(fypTvvm), t_thuong = num(tongThuongTvvm);

                if (role === 'TTN') {
                    tyLeDongHanh = t_tvvm >= 2 ? 2.0 : t_tvvm === 1 ? 1.0 : 0;
                    thuongDongHanh = tyLeDongHanh * t_thuong;
                    if (t_tvvm >= 3 && f_tvvm >= 45) thuongVuotTroi = 5000000;
                    else if (t_tvvm >= 1 && f_tvvm >= 35) thuongVuotTroi = 3000000;
                } else if (role === 'TN') {
                    tyLeTuyenLuyen = t_tvvm >= 3 ? 1.5 : t_tvvm === 2 ? 1.25 : t_tvvm === 1 ? 1.0 : 0;
                    thuongTuyenLuyen = tyLeTuyenLuyen * t_thuong;
                }

                let thuongPtkdNhom = 0;
                let fNhom = num(fypNhomThang);
                let lHdc = num(luotHdcNhom);

                if (role === 'TN') {
                    if (fNhom >= 400) tyLePtkd = lHdc >= 5 ? 0.30 : lHdc >= 3 ? 0.28 : lHdc === 2 ? 0.26 : 0.10;
                    else if (fNhom >= 200) tyLePtkd = lHdc >= 5 ? 0.26 : lHdc >= 3 ? 0.22 : lHdc === 2 ? 0.20 : 0.10;
                    else if (fNhom >= 100) tyLePtkd = lHdc >= 5 ? 0.22 : lHdc >= 3 ? 0.20 : lHdc === 2 ? 0.18 : 0.10;
                    else if (fNhom >= 50) tyLePtkd = lHdc >= 5 ? 0.20 : lHdc >= 3 ? 0.18 : lHdc === 2 ? 0.14 : 0.10;
                    else tyLePtkd = lHdc >= 5 ? 0.16 : lHdc >= 3 ? 0.14 : lHdc === 2 ? 0.10 : 0.10;
                    thuongPtkdNhom = tyLePtkd * num(fycNhomThang);
                }

                let thuongQuyNhom = 0;
                let lHdQuy = num(luotHoatDongQuy);
                
                if (role === 'TN' && pr15 >= 85 && lHdQuy >= 6) {
                    let coTuyenMoi = num(tuyenTvvmQuy) >= 1;
                    let fNhomQuy = tongFypQuyNhom;
                    
                    if (fNhomQuy >= 600) tyLeTieuChuanQuy = coTuyenMoi ? 0.22 : 0.04; 
                    else if (fNhomQuy >= 450) tyLeTieuChuanQuy = coTuyenMoi ? 0.18 : 0.04;
                    else if (fNhomQuy >= 270) tyLeTieuChuanQuy = coTuyenMoi ? 0.14 : 0.04;
                    else if (fNhomQuy >= 150) tyLeTieuChuanQuy = coTuyenMoi ? 0.09 : 0.04;
                    else tyLeTieuChuanQuy = 0; 

                    if (tltp >= 88) tyLeDieuChinhTltp = (num(phiThucThuQuy) * 3) >= 100 ? (tltp / 100) : 1; 
                    else if (tltp >= 80) tyLeDieuChinhTltp = 0.8;
                    else if (tltp >= 70) tyLeDieuChinhTltp = 0.5;
                    else if (tltp >= 60) tyLeDieuChinhTltp = 0.3;
                    
                    thuongQuyNhom = (fNhomQuy * 1000000 * 0.3) * tyLeTieuChuanQuy * tyLeDieuChinhTltp;
                }

                let thuongTuyenNgangThang = 0;
                if (isTuyenNgang) {
                    let m = num(thangChucVuTN);
                    if (role === 'TTN') {
                        const targetsTTN = [{ m: 1, fyp: 25, hdc: 2 }, { m: 2, fyp: 35, hdc: 3 }, { m: 3, fyp: 45, hdc: 4 }, { m: 4, fyp: 45, hdc: 5 }, { m: 5, fyp: 50, hdc: 6 }, { m: 6, fyp: 50, hdc: 6 }];
                        let t = targetsTTN.find(x => x.m === m);
                        if (t) thuongTuyenNgangThang = 2000000 + ((fNhom >= t.fyp && lHdc >= t.hdc) ? 8000000 : 0);
                    } else if (role === 'TN') {
                        const targetsTN = [{ m: 1, fyp: 55, hdc: 2 }, { m: 2, fyp: 65, hdc: 3 }, { m: 3, fyp: 65, hdc: 3 }, { m: 4, fyp: 70, hdc: 3 }, { m: 5, fyp: 70, hdc: 4 }, { m: 6, fyp: 80, hdc: 4 }, { m: 7, fyp: 85, hdc: 4 }, { m: 8, fyp: 90, hdc: 4 }, { m: 9, fyp: 90, hdc: 4 }, { m: 10, fyp: 100, hdc: 4 }, { m: 11, fyp: 110, hdc: 5 }, { m: 12, fyp: 120, hdc: 5 }];
                        let t = targetsTN.find(x => x.m === m);
                        if (t) thuongTuyenNgangThang = (m <= 6 ? 5000000 : 0) + ((fNhom >= t.fyp && num(soTvvmHdc) >= t.hdc) ? 15000000 : 0);
                    }
                }

                let thuongQuanLyMoiTN = 0;
                if (isNewManager && role === 'TN') {
                    let m = num(thangChucVu);
                    if (m <= 12) {
                        if (lHdc >= 4) {
                            if (fNhom >= 85) thuongQuanLyMoiTN = 8000000;
                            else if (fNhom >= 55) thuongQuanLyMoiTN = 5000000;
                            else if (fNhom >= 45) thuongQuanLyMoiTN = 5000000;
                        } else if (lHdc === 3) {
                            if (fNhom >= 85) thuongQuanLyMoiTN = 5000000;
                            else if (fNhom >= 55) thuongQuanLyMoiTN = 5000000;
                            else if (fNhom >= 45) thuongQuanLyMoiTN = 3000000;
                        } else if (lHdc === 2) {
                            if (fNhom >= 45) thuongQuanLyMoiTN = 3000000;
                        }
                    }
                }

                let thuongPhatTrienHeThongTN = 0;
                if (role === 'TN') {
                    let m = num(thangChucVuTNMoi), qlm = num(thuongQuanLyMoiTNMoi);
                    if (m >= 1 && m <= 6) thuongPhatTrienHeThongTN = qlm * 2.0;
                    else if (m >= 7 && m <= 12) thuongPhatTrienHeThongTN = qlm * 1.5;
                }

                return {
                    thuongTuyenLuyen, tyLeTuyenLuyen, thuongDongHanh, tyLeDongHanh, thuongVuotTroi, 
                    thuongPtkdNhom, tyLePtkd, thuongQuyNhom, tyLeTieuChuanQuy, tyLeDieuChinhTltp, 
                    thuongTuyenNgangThang, thuongQuanLyMoiTN, thuongPhatTrienHeThongTN,
                    tong: thuongTuyenLuyen + thuongDongHanh + thuongVuotTroi + thuongPtkdNhom + thuongQuyNhom + thuongTuyenNgangThang + thuongQuanLyMoiTN + thuongPhatTrienHeThongTN
                };

            const handleGeminiInsight = async () => {
                if (totalIncome === 0) {

                - FYP nhóm (nếu có quản lý): ${fypNhomThang || 0} Triệu.`;

                const payload = {
                    contents: [{ parts: [{ text: userQuery }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                const fetchWithBackoff = async (retries = 5, delay = 1000) => {
                    for (let i = 0; i <= retries; i++) {
                        try {
                            const response = await fetch(url, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify(payload)
                            });
                            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                            return await response.json();
                        } catch (error) {
                            if (i === retries) throw error;
                            await new Promise(res => setTimeout(res, delay));
                            delay *= 2;
                        }
                    }
                };

                try {
                    const result = await fetchWithBackoff();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;

                                                </div>
                                            )}
                                            {calcCaNhan.thuongTvvmThang > 0 && (
                                                <div className="flex justify-between items-center pt-3 border-t border-slate-200">
                                                    <span className="text-sm text-slate-600 font-medium">Thưởng TVVm mới</span>
                                                    <span className="font-money font-bold text-base text-corporate-blue">+{fmt(calcCaNhan.thuongTvvmThang)}</span>
                                                </div>
                                            )}
                                            {calcCaNhan.thuongChangTvvm > 0 && (
                                                <div className="flex justify-between items-center pt-3 border-t border-slate-200">
                                                    <span className="text-sm text-slate-600 font-medium flex items-center gap-2">Thưởng Chặng TVVm</span>
                                                    <span className="font-money font-bold text-base text-[var(--bv-gold-primary)]">+{fmt(calcCaNhan.thuongChangTvvm)}</span>
                                                </div>
                                            )}
                                            {calcCaNhan.thuongQuyCaNhan > 0 && (
                                                <div className="flex flex-col gap-1 p-3 mt-2 rounded-lg bg-blue-50 border border-blue-100">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-sm text-corporate-blue font-bold">Thưởng Quý Cá Nhân</span>
                                                        <span className="font-money font-bold text-lg text-corporate-blue">+{fmt(calcCaNhan.thuongQuyCaNhan)}</span>
                                                    </div>
                                                    <div className="flex justify-end gap-2 text-[9px] text-blue-600/80 font-data mt-1 uppercase">
                                                        <span>TL: {calcCaNhan.tyLeThuongQuy * 100}%</span>
                                                        <span>|</span>
                                                        <span>ĐC: {calcCaNhan.tyLeDieuChinhTltp * 100}%</span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* SECTION: THU NHẬP QUẢN LÝ NHÓM */}
                                    {role !== 'TVV' && calcNhom.tong > 0 && (
                                        <div className="space-y-4">
                                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                <i className="fas fa-users-cog text-slate-300"></i> Quản Lý Nhóm
                                            </h3>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                
                                                {calcNhom.thuongTuyenNgangThang > 0 && (
                                                    <div className="flex justify-between items-center p-3 rounded-lg bg-amber-50 border border-amber-200">
                                                        <span className="text-sm text-amber-800 font-bold">Tuyển Ngang (T{thangChucVuTN})</span>
                                                        <span className="font-money font-bold text-lg text-amber-600">+{fmt(calcNhom.thuongTuyenNgangThang)}</span>
                                                    </div>
                                                )}
                                                {num(thuongLuyKeTuyenNgang) > 0 && (
                                                    <div className="flex justify-between items-center p-3 mt-2 rounded-lg bg-[var(--bv-gold-light)]/20 border border-[var(--bv-gold-primary)]/40">
                                                        <span className="text-sm text-[var(--bv-gold-dark)] font-bold">Lũy Kế Tuyển Ngang</span>
                                                        <span className="font-money font-bold text-lg text-[var(--bv-gold-primary)]">+{fmt(thuongLuyKeTuyenNgang)}</span>
                                                    </div>
                                                )}

                                                {(role === 'TTN' || role === 'TN') && calcNhom.thuongDongHanh > 0 && (
                                                    <div className="flex flex-col gap-1 pt-3 border-t border-slate-200">
                                                        <div className="flex justify-between items-center">
                                                            <span className="text-sm text-slate-600 font-medium">Thưởng Đồng Hành</span>
                                                            <span className="font-money font-bold text-base text-corporate-blue">+{fmt(calcNhom.thuongDongHanh)}</span>
                                                        </div>
                                                        <span className="text-[10px] text-slate-400 font-data text-right">Tỷ lệ: {calcNhom.tyLeDongHanh * 100}%</span>
                                                    </div>
                                                )}
                                                {(role === 'TTN' || role === 'TN') && calcNhom.thuongVuotTroi > 0 && (
                                                    <div className="flex justify-between items-center pt-3 border-t border-slate-200">
                                                        <span className="text-sm text-slate-600 font-medium">Thưởng Vượt Trội</span>
                                                        <span className="font-money font-bold text-base text-corporate-blue">+{fmt(calcNhom.thuongVuotTroi)}</span>
                                                    </div>
                                                )}
                                                
                                                {role === 'TN' && calcNhom.thuongTuyenLuyen > 0 && (
                                                    <div className="flex flex-col gap-1 pt-3 border-t border-slate-200">
                                                        <div className="flex justify-between items-center">
                                                            <span className="text-sm text-slate-600 font-medium">Thưởng Tuyển Luyện</span>
                                                            <span className="font-money font-bold text-base text-corporate-blue">+{fmt(calcNhom.thuongTuyenLuyen)}</span>
                                                        </div>
                                                        <span className="text-[10px] text-slate-400 font-data text-right">Tỷ lệ: {calcNhom.tyLeTuyenLuyen * 100}%</span>
                                                    </div>
                                                )}

                                                {isNewManager && calcNhom.thuongQuanLyMoiTN > 0 && (
                                                    <div className="flex justify-between items-center pt-3 border-t border-slate-200">
                                                        <span className="text-sm text-corporate-blue font-bold flex items-center gap-2"><i className="fas fa-star"></i> Thưởng Quản Lý Mới (TN)</span>
                                                        <span className="font-money font-bold text-base text-corporate-blue">+{fmt(calcNhom.thuongQuanLyMoiTN)}</span>
                                                    </div>
                                                )}
                                                
                                                {role === 'TN' && calcNhom.thuongPhatTrienHeThongTN > 0 && (
                                                    <div className="flex justify-between items-center pt-3 border-t border-slate-200">
                                                        <span className="text-sm text-indigo-700 font-bold flex items-center gap-2"><i className="fas fa-network-wired text-indigo-500"></i> PT Hệ Thống (TN)</span>
                                                        <span className="font-money font-bold text-base text-indigo-600">+{fmt(calcNhom.thuongPhatTrienHeThongTN)}</span>
                                                    </div>
                                                )}

                                                {role === 'TN' && calcNhom.thuongPtkdNhom > 0 && (
                                                    <div className="flex flex-col gap-1 pt-3 border-t border-slate-200">
                                                        <div className="flex justify-between items-center">
                                                            <span className="text-sm text-slate-600 font-medium">Thưởng PTKD Nhóm</span>
                                                            <span className="font-money font-bold text-base text-corporate-blue">+{fmt(calcNhom.thuongPtkdNhom)}</span>
                                                        </div>
                                                        <span className="text-[10px] text-slate-400 font-data text-right">Tỷ lệ: {calcNhom.tyLePtkd * 100}%</span>
                                                    </div>
                                                )}
                                                {role === 'TN' && calcNhom.thuongQuyNhom > 0 && (
                                                    <div className="flex flex-col gap-1 p-3 mt-2 rounded-lg bg-blue-50 border border-blue-100">
                                                        <div className="flex justify-between items-center">
                                                            <span className="text-sm text-corporate-blue font-bold">Thưởng Quý Nhóm</span>
                                                            <span className="font-money font-bold text-lg text-corporate-blue">+{fmt(calcNhom.thuongQuyNhom)}</span>
                                                        </div>
                                                        <div className="flex justify-end gap-2 text-[9px] text-blue-600/80 font-data mt-1 uppercase">
                                                            <span>TC: {calcNhom.tyLeTieuChuanQuy * 100}%</span>
                                                            <span>|</span>
                                                            <span>ĐC: {calcNhom.tyLeDieuChinhTltp * 100}%</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* SECTION: THI ĐUA */}
                                    {(num(thiDuaTCT) > 0 || num(thiDuaCT) > 0) && (
                                        <div className="space-y-4">
                                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                <i className="fas fa-gift text-slate-300"></i> Thi Đua
                                            </h3>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                                {num(thiDuaTCT) > 0 && (
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-sm text-slate-600 font-medium">Thi Đua TCT</span>
                                                        <span className="font-money font-bold text-base text-[var(--bv-gold-primary)]">+{fmt(thiDuaTCT)}</span>
                                                    </div>
                                                )}
                                                {num(thiDuaCT) > 0 && (
                                                    <div className="flex justify-between items-center pt-3 border-t border-slate-200">
                                                        <span className="text-sm text-slate-600 font-medium">Thi Đua BVNT SG</span>
                                                        <span className="font-money font-bold text-base text-[var(--bv-gold-primary)]">+{fmt(thiDuaCT)}</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* BẢNG TỔNG KẾT BLUE */}
                                <div className="mt-auto total-card p-6 md:p-8 text-center rounded-[2rem] mt-6">
                                    <div className="relative z-10">
                                        <div className="inline-block bg-white/20 px-5 py-1.5 rounded-full text-blue-50 text-[10px] font-black tracking-widest uppercase border border-white/30 shadow-sm mb-4">
                                            Tổng Thu Nhập Dự Kiến
                                        </div>
                                        <div className="text-4xl lg:text-5xl font-black text-white font-money tracking-tight drop-shadow-md">
                                            {fmt(totalIncome)} <span className="text-xl text-blue-200 ml-1">₫</span>
                                        </div>
                                        {tyLeThuNhapSoVoiDoanhThu > 0 && (
                                            <div className="mt-4 flex justify-center">
                                                <span className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-white/10 border border-white/20 text-white text-[11px] font-data font-semibold uppercase tracking-widest">
                                                    <i className="fas fa-chart-pie opacity-80"></i> Thu Nhập / Doanh Thu: <span className="text-yellow-300 font-bold">{tyLeThuNhapSoVoiDoanhThu.toFixed(2)}%</span>
                                                </span>
                                            </div>
                                        )}
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                    
                    {/* ================= THANH TỔNG THU NHẬP DÀNH RIÊNG CHO MOBILE ================= */}
                    <div className="xl:hidden fixed bottom-0 left-0 w-full bg-gradient-to-r from-blue-700 to-blue-900 border-t border-blue-600 p-4 z-50 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,122,194,0.3)]">
                        <div className="flex justify-between items-center max-w-xl mx-auto px-2">
                            <div className="flex flex-col cursor-pointer" onClick={() => document.getElementById('bang-luong-chi-tiet').scrollIntoView({ behavior: 'smooth', block: 'start' })}>
                                <span className="text-blue-200 font-bold text-[10px] tracking-widest uppercase mb-1">Tổng thu nhập <span className="lowercase font-normal opacity-80">(Chạm xem chi tiết)</span> <i className="fas fa-hand-pointer ml-1"></i></span>
                                <div className="flex items-end gap-2">
                                    <span className="text-2xl font-black text-white font-money leading-none">{fmt(totalIncome)}</span>
                                    {tyLeThuNhapSoVoiDoanhThu > 0 && (
                                        <span className="text-yellow-300 text-[11px] font-data font-bold mb-0.5">({tyLeThuNhapSoVoiDoanhThu.toFixed(1)}%)</span>
                                    )}
                                </div>
                            </div>
                            <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center shadow-lg border border-white/30 backdrop-blur-md" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                                <i className="fas fa-chevron-up text-white text-sm"></i>
                            </div>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
